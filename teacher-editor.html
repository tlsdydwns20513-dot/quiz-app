<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>교사용 콘텐츠 편집기</title>
    <style>
      :root {
        font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
        background: #eef4f8;
        color: #142b3d;
      }

      body {
        margin: 0;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .editor-header {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: center;
        padding: 18px 24px;
        border-bottom: 1px solid #cbd9e3;
        background: rgba(248, 251, 255, 0.94);
        backdrop-filter: blur(12px);
      }

      .editor-header p {
        margin: 0 0 4px;
        color: #4b6478;
        font-size: 13px;
        font-weight: 700;
      }

      .editor-header h1 {
        margin: 0;
        font-size: 26px;
      }

      .editor-subtitle {
        display: block;
        margin-top: 6px;
        color: #5d7487;
        font-size: 13px;
        font-weight: 700;
      }

      .editor-note {
        margin: 12px 0 0;
        padding: 10px 12px;
        border: 1px solid #b7d9d6;
        border-radius: 8px;
        background: #eefdfa;
        color: #155e59;
        font-size: 13px;
        font-weight: 800;
        line-height: 1.45;
      }

      .editor-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      button,
      .file-button {
        min-height: 38px;
        padding: 0 13px;
        border: 1px solid #9cb3c4;
        border-radius: 7px;
        background: #ffffff;
        color: #17384d;
        font-weight: 800;
        cursor: pointer;
      }

      button:hover,
      .file-button:hover {
        background: #e6f0f7;
      }

      .file-button {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
      }

      .file-button input {
        display: none;
      }

      .validation {
        margin: 20px auto 0;
        max-width: 1180px;
        padding: 14px 16px;
        border-radius: 8px;
        line-height: 1.55;
        font-weight: 700;
      }

      .validation p {
        margin: 0 0 6px;
      }

      .validation.valid {
        border: 1px solid #72bf84;
        background: #ecf9ef;
        color: #123f24;
      }

      .validation.invalid {
        border: 1px solid #d75b62;
        background: #fff1f1;
        color: #5b1219;
      }

      .domain-list {
        max-width: 1180px;
        margin: 20px auto 54px;
        padding: 0 20px;
      }

      .editor-shell {
        display: grid;
        gap: 26px;
        max-width: 1240px;
        margin: 22px auto 64px;
        padding: 0 20px;
      }

      .editor-section {
        display: grid;
        gap: 14px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 16px 18px;
        border: 1px solid #c5d4df;
        border-radius: 10px;
        background: #f8fbff;
      }

      .section-title p {
        margin: 0 0 4px;
        color: #60788d;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.02em;
      }

      .section-title h2 {
        margin: 0;
        font-size: 22px;
      }

      .section-title strong {
        color: #18364f;
        white-space: nowrap;
      }

      .compact-list {
        max-width: none;
        margin: 0;
        padding: 0;
      }

      .domain-card,
      .question-card {
        border: 1px solid #c5d4df;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 48px rgba(24, 54, 79, 0.08);
      }

      .domain-card {
        margin-bottom: 18px;
        padding: 18px;
      }

      .domain-head,
      .question-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 14px;
      }

      .domain-head p {
        margin: 0 0 4px;
        color: #60788d;
        font-size: 13px;
        font-weight: 800;
      }

      .domain-head h2,
      .question-head h3 {
        margin: 0;
      }

      label {
        display: grid;
        gap: 6px;
        color: #496173;
        font-size: 13px;
        font-weight: 800;
      }

      input,
      textarea,
      select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #adc0cf;
        border-radius: 7px;
        background: #fbfdff;
        color: #142b3d;
      }

      input,
      select {
        min-height: 38px;
        padding: 0 10px;
      }

      textarea {
        min-height: 72px;
        padding: 10px;
        resize: vertical;
        line-height: 1.5;
      }

      .question-list {
        display: grid;
        gap: 14px;
        margin-top: 16px;
      }

      .question-card {
        padding: 16px;
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin: 12px 0;
      }

      .survey-editor {
        border-color: #b7d9d6;
      }

      .survey-meta-grid,
      .survey-question-grid,
      .survey-option-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin: 12px 0;
      }

      .survey-option-grid.five-columns {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .survey-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .survey-card {
        border-color: #b7d9d6;
        background: #ffffff;
      }

      .editor-error {
        padding: 40px;
        color: #7f1d1d;
        font-weight: 800;
      }

      @media (max-width: 760px) {
        .editor-header,
        .domain-head,
        .question-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .choice-grid,
        .survey-meta-grid,
        .survey-question-grid,
        .survey-option-grid,
        .survey-option-grid.five-columns {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="teacher-editor"></div>
    <script>
      window.VR_QUIZ_CONFIG = {
        quizUrl: './src/data/quizData.json',
        surveyUrl: './src/data/surveyData.json'
      };
    </script>
    <script type="module" src="./src/teacher-editor-main.js?v=20260510-inplacegrid1"></script>
  </body>
</html>
