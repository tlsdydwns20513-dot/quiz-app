<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spline Desktop Preview</title>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.57/build/spline-viewer.js"></script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #0f1720;
      }

      spline-viewer,
      .empty {
        width: 100%;
        height: 100%;
      }

      .empty {
        display: grid;
        place-items: center;
        color: #f8fbff;
        font-family: Pretendard, "Noto Sans KR", sans-serif;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div id="preview"></div>
    <script>
      const url = new URLSearchParams(window.location.search).get('url');
      const preview = document.querySelector('#preview');
      if (url) {
        preview.innerHTML = `<spline-viewer url="${url.replace(/"/g, '&quot;')}"></spline-viewer>`;
      } else {
        preview.innerHTML = '<main class="empty">?url= 에 Spline Viewer URL을 넣어 주세요.</main>';
      }
    </script>
  </body>
</html>
